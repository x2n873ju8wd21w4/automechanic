# GitHub Actions: один тик конвейера AutoMech под ОДНИМ аккаунтом/репо.
# Без кольца и без эстафеты аккаунтам — расписание держит нативный cron ниже.
# Секреты (Settings -> Secrets and variables -> Actions -> New repository secret):
#   ADO_ORG, ADO_PROJECT, ADO_PAT                — доска Azure DevOps
#   YOUTUBE_API_KEY                              — discovery (опц., есть yt-dlp фолбэк)
#   DISTILL_API_KEY (или NIM_API_KEY)            — дистилляция (используется облачным
#                                                    агентом, не этим тиком, но пусть будет)
#   SUPADATA_API_KEY, YTDLP_PROXY                — субтитры/прокси (опц.)
#   CRAWL_PROXY, CRAWL_PROXY_KEY                 — форум-краул (опц.)
#   S3_ENDPOINT, S3_KEY, S3_SECRET               — архив (опц.)
#   QDRANT_URL, QDRANT_API_KEY                   — индекс (опц.)
#   BACKUP_REPO, BACKUP_GITHUB_TOKEN             — репо ежедневного бэкапа (опц.)

name: automech-tick

on:
  workflow_dispatch:      # ручной запуск для теста кольца или явного пуша
    inputs:
      task:
        description: "Force specific task (subs/forums/delta/embed/discover) or random if empty"
        required: false
        default: ""
      run_all:
        description: "TEST MODE: Run ALL tasks in random order (subs→forums→delta→embed→discover)"
        required: false
        default: "false"
      batch:
        description: "Batch size (для ring handoff)"
        required: false
        default: "3"
      partition:
        description: "Partition (для ring handoff)"
        required: false
        default: "solo"
      idle:
        description: "Ring IDLE counter (для ring handoff)"
        required: false
        default: "0"

concurrency:
  group: automech-tick-${{ github.repository_owner }}
  cancel-in-progress: true

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: зависимости + Chromium (tubetranscript / forums-js)
        run: |
          pip install -q "yt-dlp[default,curl-cffi]" playwright -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: один тик конвейера
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          ADO_ORG: ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISTILL_API_KEY: ${{ secrets.DISTILL_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          YTDLP_PROXY: ${{ secrets.YTDLP_PROXY }}
          CRAWL_PROXY: ${{ secrets.CRAWL_PROXY }}
          CRAWL_PROXY_KEY: ${{ secrets.CRAWL_PROXY_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_KEY: ${{ secrets.S3_KEY }}
          S3_SECRET: ${{ secrets.S3_SECRET }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          BACKUP_REPO: ${{ secrets.BACKUP_REPO }}
          BACKUP_GITHUB_TOKEN: ${{ secrets.BACKUP_GITHUB_TOKEN }}
          NEXT_GITHUB_TOKEN: ${{ secrets.NEXT_GITHUB_TOKEN }}
          NEXT_GITHUB_REPO: ${{ secrets.NEXT_GITHUB_REPO }}
          NEXT_GITHUB_WORKFLOW: ${{ secrets.NEXT_GITHUB_WORKFLOW }}
          RING_SIZE: ${{ secrets.RING_SIZE }}
          RING_IDLE: ${{ inputs.idle || '0' }}
          PARTITION: ${{ inputs.partition || '' }}
          SUBTITLE_PROVIDERS: "tubetranscript"
        run: |
          echo "[workflow] GITHUB_ACTOR=$GITHUB_ACTOR"
          echo "[workflow] github.actor=${{ github.actor }}"
          echo "[workflow] Running ci_tick.py..."

          TASK_ARG=""
          if [ -n "${{ github.event.inputs.task }}" ]; then
            TASK_ARG="--task ${{ github.event.inputs.task }}"
          fi
          RUN_ALL_ARG=""
          if [ "${{ github.event.inputs.run_all }}" = "true" ]; then
            RUN_ALL_ARG="--run-all"
          fi
          BATCH="${{ github.event.inputs.batch || '10' }}"
          PARTITION="${{ github.event.inputs.partition || 'solo' }}"
          python scripts/ci_tick.py --batch "$BATCH" --partition "$PARTITION" $TASK_ARG $RUN_ALL_ARG
